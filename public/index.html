<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeployAI — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161a23;
      --surface2: #1e2433;
      --border: #2a3044;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.18);
      --accent2: #22d3ee;
      --text: #e2e8f0;
      --muted: #64748b;
      --user-bubble: #6366f1;
      --bot-bubble: #1e2433;
      --success: #22c55e;
      --warn: #f59e0b;
      --radius: 16px;
      --font: 'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,20,0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }
    .dot.offline { background: var(--muted); box-shadow: none; animation: none; }

    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.4; }
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .welcome-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .welcome h2 { font-size: 22px; font-weight: 700; }
    .welcome p { color: var(--muted); max-width: 360px; font-size: 13px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      color: var(--text);
    }
    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    /* ── Message row ── */
    .msg-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg-row.user { align-items: flex-end; }
    .msg-row.bot  { align-items: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .msg-row.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ── Inference card ── */
    .inference-card {
      max-width: 72%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      font-size: 12px;
    }
    .ic-row { display: flex; flex-direction: column; gap: 2px; }
    .ic-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .6px; }
    .ic-val { font-weight: 600; font-size: 12px; }
    .ic-id {
      display: inline-block;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(99,102,241,.3);
      border-radius: 6px;
      padding: 1px 7px;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
    }
    .ic-id.action {
      background: rgba(34,211,238,.08);
      color: var(--accent2);
      border-color: rgba(34,211,238,.25);
    }
    .confidence {
      grid-column: 1/-1;
      display: flex; align-items: center; gap: 6px;
    }
    .conf-bar {
      flex: 1; height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .conf-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .4s ease;
    }
    .conf-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* ── Typing indicator ── */
    .typing {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,60%,100% { transform:translateY(0); }
      30% { transform:translateY(-5px); }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(13,15,20,0.9);
      backdrop-filter: blur(12px);
    }
    .input-wrap {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color .15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    #msg-input {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none; border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
      color: #fff;
    }
    #send-btn:hover { background: #4f46e5; }
    #send-btn:active { transform: scale(.92); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .input-hint { font-size: 11px; color: var(--muted); margin-top: 8px; text-align: center; }

    /* ── Error toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #7f1d1d; border: 1px solid #dc2626;
      color: #fca5a5; border-radius: 10px;
      padding: 10px 18px; font-size: 13px;
      animation: fadeUp .2s ease;
      z-index: 99;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-logo">🚀</div>
    <div>
      <div class="header-title">DeployAI</div>
      <div class="header-sub">Intent classification engine</div>
    </div>
    <div class="status-dot">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Online</span>
    </div>
  </header>

  <!-- Chat -->
  <div class="chat-area" id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>DeployAI Assistant</h2>
      <p>Type anything — I'll classify your intent and map it to the right deployment action.</p>
      <div class="chips">
        <div class="chip" onclick="send('deploy my app to vercel')">Deploy to Vercel</div>
        <div class="chip" onclick="send('my build is failing')">Build failing</div>
        <div class="chip" onclick="send('how much will this cost?')">Cost estimate</div>
        <div class="chip" onclick="send('set up a postgres database')">Setup database</div>
        <div class="chip" onclick="send('show me the logs')">View logs</div>
        <div class="chip" onclick="send('rollback to previous version')">Rollback</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="Type a message…" autofocus></textarea>
      <button id="send-btn" onclick="sendFromInput()" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press <kbd style="background:var(--border);padding:1px 5px;border-radius:4px;font-size:11px">Enter</kbd> to send &nbsp;·&nbsp; <kbd style="background:var(--border);padding:1px 5px;border-radius:4px;font-size:11px">Shift+Enter</kbd> for new line</div>
  </div>

</div>

<script>
const chat    = document.getElementById('chat');
const input   = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const welcome = document.getElementById('welcome');
const API     = '/classify';

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = input.scrollHeight + 'px';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromInput(); }
});

// Check backend health on load
fetch('/health')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(d => setStatus(true, `Online · ${d.model}`))
  .catch(() => setStatus(false, 'Offline'));

function setStatus(online, text) {
  document.getElementById('status-dot').className = online ? 'dot' : 'dot offline';
  document.getElementById('status-text').textContent = text;
}

function sendFromInput() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  send(text);
}

async function send(text) {
  if (welcome) welcome.remove();

  appendUserBubble(text);
  sendBtn.disabled = true;

  const typingEl = appendTyping();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    typingEl.remove();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Server error' }));
      appendBotBubble(`⚠️ ${err.error || 'Something went wrong.'}`);
    } else {
      const data = await res.json();
      appendBotResponse(data);
    }
  } catch (e) {
    typingEl.remove();
    appendBotBubble('⚠️ Cannot reach the server. Is it running?');
    setStatus(false, 'Offline');
  }

  sendBtn.disabled = false;
  input.focus();
  scrollBottom();
}

function appendUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  chat.appendChild(row);
  scrollBottom();
}

function appendBotBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  chat.appendChild(row);
  scrollBottom();
}

function appendBotResponse(data) {
  const row = document.createElement('div');
  row.className = 'msg-row bot';

  const confWidths = { high: '90%', medium: '55%', low: '25%' };
  const confWidth  = confWidths[data.confidence] || '50%';

  row.innerHTML = `
    <div class="bubble">${escHtml(data.chat_reply || 'Done.')}</div>
    <div class="inference-card">
      <div class="ic-row">
        <span class="ic-label">Inference</span>
        <span class="ic-val">
          <span class="ic-id">${data.inference_id}</span>
        </span>
        <span style="color:var(--muted);font-size:11px;margin-top:2px">${data.inference_label || ''}</span>
      </div>
      <div class="ic-row">
        <span class="ic-label">Action</span>
        <span class="ic-val">
          <span class="ic-id action">${data.action_id}</span>
        </span>
        <span style="color:var(--muted);font-size:11px;margin-top:2px">${data.action_label || ''}</span>
      </div>
      <div class="confidence">
        <span class="ic-label" style="white-space:nowrap">Confidence</span>
        <div class="conf-bar"><div class="conf-fill" style="width:${confWidth}"></div></div>
        <span class="conf-label">${data.confidence}</span>
      </div>
    </div>`;

  chat.appendChild(row);
  scrollBottom();
}

function appendTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(row);
  scrollBottom();
  return row;
}

function scrollBottom() {
  chat.scrollTop = chat.scrollHeight;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
</script>
</body>
</html>
